<!doctype html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edison Martinez — Full-Stack Developer</title>
  <meta name="description" content="Desarrollador Web Full-Stack especializado en React, Node.js, Express y MongoDB. Soluciones web completas, modernas y funcionales." />
  <meta name="author" content="Edison Martinez" />
  <meta property="og:title" content="Edison Martinez — Full-Stack Developer" />
  <meta property="og:description" content="Desarrollador Web Full-Stack especializado en React, Node.js, Express y MongoDB." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Tailwind CSS v4 via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- React + ReactDOM UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel standalone for JSX -->
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 10px 30px rgba(14, 165, 233, 0.4), 0 4px 12px rgba(168, 85, 247, 0.2); }
      50% { box-shadow: 0 15px 40px rgba(14, 165, 233, 0.5), 0 6px 16px rgba(168, 85, 247, 0.3); }
    }
    :root { color-scheme: dark; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.75rem 1.5rem; font-weight: 600; border-radius: 0.75rem; transition: all 0.3s; }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-primary:hover { background: #0284c7; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(14,165,233,0.2); }
    .btn-outline { background: transparent; border: 2px solid #0ea5e9; color: #0ea5e9; }
    .btn-outline:hover { background: #0ea5e9; color: #000; }
    .animate-fade-up { animation: fadeUp 0.8s ease-out forwards; opacity: 0; }
    .skeleton-line { height: 1rem; background: linear-gradient(90deg, #1e293b, #2d3a4f, #1e293b); background-size: 200% 100%; border-radius: 0.25rem; animation: shimmer 1.5s infinite; }
    .cv-inner { display: grid; grid-template-columns: 340px 1fr; max-width: 1300px; margin: 0 auto; min-height: 100vh; }
    .cv-sidebar { background: #111827; border-right: 1px solid #2d3a4f; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 2.5rem; position: sticky; top: 5rem; max-height: calc(100vh - 5rem); overflow-y: auto; }
    .cv-main { padding: 2rem 3rem 4rem; max-width: 860px; }
    @media (max-width: 1024px) {
      .cv-inner { grid-template-columns: 1fr; }
      .cv-sidebar { border-right: none; border-bottom: 1px solid #2d3a4f; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; padding: 1.5rem; position: static; max-height: none; }
      .cv-main { padding: 1.5rem; }
    }
    @media (max-width: 768px) {
      .cv-sidebar { grid-template-columns: 1fr; padding: 1rem; }
      .cv-main { padding: 1rem; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body class="bg-[#0a0f1a] text-[#f1f5f9] antialiased">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 z-50 px-4 py-2 bg-[#0ea5e9] text-white font-semibold rounded-lg">Saltar al contenido principal</a>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, createContext, useContext, forwardRef } = React;

    /* ── Theme Context ── */
    const ThemeContext = createContext(null);
    function ThemeProvider({ children }) {
      const [dark, setDark] = useState(() => {
        if (typeof window !== 'undefined') {
          const saved = localStorage.getItem('theme');
          if (saved) return saved === 'dark';
          return window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        return true;
      });
      useEffect(() => {
        const root = document.documentElement;
        if (dark) { root.classList.add('dark'); } else { root.classList.remove('dark'); }
        localStorage.setItem('theme', dark ? 'dark' : 'light');
      }, [dark]);
      return React.createElement(ThemeContext.Provider, { value: { dark, toggleTheme: () => setDark(d => !d) } }, children);
    }
    function useTheme() {
      const ctx = useContext(ThemeContext);
      if (!ctx) throw new Error('useTheme must be used within ThemeProvider');
      return ctx;
    }

    /* ── Navbar ── */
    const navItems = [
      { id: 'home', label: 'Inicio' }, { id: 'projects', label: 'Proyectos' },
      { id: 'skills', label: 'Skills' }, { id: 'services', label: 'Servicios' },
      { id: 'contact', label: 'Contacto' }, { id: 'cv', label: 'CV' },
    ];
    function scrollToSection(id) {
      const el = document.getElementById(id);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
    }
    function Navbar() {
      const [mobileOpen, setMobileOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);
      const { dark, toggleTheme } = useTheme();
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 20);
        window.addEventListener('scroll', fn);
        return () => window.removeEventListener('scroll', fn);
      }, []);
      return (
        <nav className={'fixed top-0 left-0 right-0 z-50 transition-all duration-300 ' + (scrolled ? 'bg-[#0a0f1a]/95 backdrop-blur-md border-b border-[#2d3a4f]' : 'bg-transparent')}>
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex items-center justify-between h-16">
              <a href="#home" className="text-xl font-bold text-[#f1f5f9] hover:text-[#0ea5e9] transition-colors" aria-label="Edison Martinez">EM</a>
              <div className="hidden md:flex items-center gap-8">
                {navItems.map(item => (
                  <a key={item.id} href={'#' + item.id} onClick={e => { e.preventDefault(); scrollToSection(item.id); }}
                    className="text-sm font-medium text-[#94a3b8] hover:text-[#0ea5e9] transition-colors duration-200">{item.label}</a>
                ))}
                <button onClick={toggleTheme}
                  className="p-2 rounded-xl bg-[#1e293b] border border-[#2d3a4f] text-[#94a3b8] hover:border-[#0ea5e9] hover:text-[#0ea5e9] transition-all duration-200"
                  aria-label={dark ? 'Modo claro' : 'Modo oscuro'}>
                  {dark ? (
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                  ) : (
                    <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
                  )}
                </button>
              </div>
              <button className="md:hidden p-2 rounded-xl bg-[#1e293b] border border-[#2d3a4f] text-[#94a3b8] hover:border-[#0ea5e9] hover:text-[#0ea5e9] transition-all"
                onClick={() => setMobileOpen(!mobileOpen)} aria-expanded={mobileOpen} aria-controls="mobile-menu" aria-label="Menu">
                {mobileOpen ? (
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                ) : (
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" /></svg>
                )}
              </button>
            </div>
            <div id="mobile-menu" className={'md:hidden overflow-hidden transition-all duration-300 ease-in-out ' + (mobileOpen ? 'max-h-96 opacity-100' : 'max-h-0 opacity-0')}>
              <div className="py-4 space-y-2 border-t border-[#2d3a4f]">
                {navItems.map(item => (
                  <a key={item.id} href={'#' + item.id} onClick={e => { e.preventDefault(); scrollToSection(item.id); setMobileOpen(false); }}
                    className="block px-4 py-3 rounded-xl text-base font-medium text-[#94a3b8] hover:bg-[#1e293b] hover:text-[#0ea5e9]">{item.label}</a>
                ))}
                <button onClick={toggleTheme}
                  className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl bg-[#1e293b] border border-[#2d3a4f] text-[#94a3b8] hover:border-[#0ea5e9] hover:text-[#0ea5e9] transition-all">
                  {dark ? (<><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg> Modo claro</>)
                    : (<><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg> Modo oscuro</>)}
                </button>
              </div>
            </div>
          </div>
        </nav>
      );
    }

    /* ── Hero ── */
    function Hero() {
      return (
        <header id="home" className="relative min-h-[90vh] flex items-center justify-center text-center px-6 overflow-hidden"
          style={{ background: 'radial-gradient(ellipse 80% 50% at 50% -20%, rgba(6, 182, 212, 0.15) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 80% 100%, rgba(168, 85, 247, 0.1) 0%, transparent 60%), #0a0f1a' }}>
          <div className="absolute inset-0 bg-gradient-to-b from-transparent to-[#0a0f1a] pointer-events-none opacity-50" />
          <div className="relative z-10 max-w-4xl">
            <span className="inline-flex items-center gap-2 px-4 py-2 bg-[#0ea5e9]/10 border border-[#0ea5e9] rounded-full text-sm font-semibold text-[#0ea5e9] mb-6" style={{ animation: 'fadeUp 0.8s ease-out 0.1s forwards', opacity: 0 }}>
              <span className="relative flex h-2 w-2"><span className="animate-ping absolute inset-0 h-full w-full rounded-full bg-[#0ea5e9] opacity-75" /><span className="relative block h-full w-full rounded-full bg-[#0ea5e9]" /></span>
              Disponible para nuevos proyectos
            </span>
            <h1 className="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-black leading-[1.05] tracking-tight mb-6" style={{ background: 'linear-gradient(135deg, #f1f5f9, #0ea5e9, #a855f7)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', animation: 'fadeUp 0.8s ease-out 0.2s forwards', opacity: 0 }}>
              Hola, soy <span className="relative">Edison Martinez<span className="absolute -bottom-2 left-0 right-0 h-1.5 bg-[#0ea5e9]/50" /></span>
            </h1>
            <h2 className="text-xl sm:text-2xl font-medium text-[#94a3b8] mb-6 max-w-2xl mx-auto" style={{ animation: 'fadeUp 0.8s ease-out 0.3s forwards', opacity: 0 }}>
              Desarrollador Web Full-Stack &bull; React &bull; Node.js &bull; MongoDB &bull; Arquitectura Cloud
            </h2>
            <p className="text-[#94a3b8] text-lg leading-relaxed max-w-2xl mx-auto mb-10" style={{ animation: 'fadeUp 0.8s ease-out 0.4s forwards', opacity: 0 }}>
              Construyo productos digitales escalables, performantes y con excelente DX. 5+ a&ntilde;os transformando ideas en soluciones robustas.
            </p>
            <div className="flex flex-col sm:flex-row gap-4 justify-center" style={{ animation: 'fadeUp 0.8s ease-out 0.5s forwards', opacity: 0 }}>
              <a href="#contact" className="btn btn-primary group inline-flex items-center gap-2 px-8 py-4 text-lg">
                Contratarme <svg className="w-5 h-5 transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8l4 4m0 0l-4 4m4-4H3" /></svg>
              </a>
              <a href="#projects" className="btn btn-outline inline-flex items-center gap-2 px-8 py-4 text-lg">
                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                Ver Proyectos
              </a>
            </div>
            <div className="mt-16 flex flex-wrap items-center justify-center gap-8 text-[#64748b]" style={{ animation: 'fadeUp 0.8s ease-out 0.6s forwards', opacity: 0 }}>
              <div className="flex items-center gap-2"><svg className="w-5 h-5 text-[#0ea5e9]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>5+ a&ntilde;os exp.</span></div>
              <div className="flex items-center gap-2"><svg className="w-5 h-5 text-[#0ea5e9]" fill="currentColor" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg><span>15+ proyectos</span></div>
              <div className="flex items-center gap-2"><svg className="w-5 h-5 text-[#0ea5e9]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><span>100% satisfacci&oacute;n</span></div>
            </div>
          </div>
          <div className="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce"><svg className="w-6 h-6 text-[#64748b]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 14l-7 7m0 0l-7-7m7 7V4" /></svg></div>
        </header>
      );
    }

    /* ── Projects ── */
    const techColors = {
      React: 'bg-blue-500/20 text-blue-400', Node: 'bg-green-500/20 text-green-400',
      MongoDB: 'bg-green-600/20 text-green-500', Express: 'bg-gray-500/20 text-gray-400',
      TypeScript: 'bg-blue-600/20 text-blue-300', Tailwind: 'bg-cyan-500/20 text-cyan-400',
      Next: 'bg-gray-800/50 text-gray-300', PostgreSQL: 'bg-blue-700/20 text-blue-500',
      Docker: 'bg-blue-400/20 text-blue-400', AWS: 'bg-orange-500/20 text-orange-400',
      Stripe: 'bg-purple-500/20 text-purple-400', GraphQL: 'bg-pink-500/20 text-pink-400',
      default: 'bg-[#2d3a4f] text-[#94a3b8]'
    };
    function getTechColor(tech) { return techColors[tech] || techColors.default; }

    const ProjectCard = forwardRef(function ProjectCard({ project }, ref) {
      const techs = project.technologies || ['React', 'Node', 'MongoDB'];
      return (
        <article ref={ref} className="group relative bg-[#1e293b] border border-[#2d3a4f] rounded-2xl overflow-hidden transition-all duration-500 hover:border-[#0ea5e9]/50 hover:shadow-[0_20px_40px_rgba(14,165,233,0.15)] hover:-translate-y-2">
          <div className="relative aspect-video overflow-hidden bg-[#111827]">
            <div className="absolute inset-0 bg-gradient-to-t from-[#0a0f1a]/90 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500" />
            <div className="absolute inset-0 bg-gradient-to-tr from-[#0ea5e9]/10 to-purple-500/10 opacity-0 group-hover:opacity-10 transition-opacity duration-500" />
            <div className="absolute bottom-4 left-4 right-4 translate-y-6 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-500 flex gap-3 justify-center">
              {project.demoUrl && <a href={project.demoUrl} target="_blank" rel="noopener noreferrer" className="flex-1 max-w-[140px] px-4 py-2.5 bg-[#0ea5e9] text-black font-semibold rounded-lg text-center transition-all hover:bg-[#0284c7] hover:shadow-lg hover:shadow-[#0ea5e9]/20">Demo</a>}
              {project.repoUrl && <a href={project.repoUrl} target="_blank" rel="noopener noreferrer" className="flex-1 max-w-[140px] px-4 py-2.5 border-2 border-[#0ea5e9] text-[#0ea5e9] font-semibold rounded-lg text-center transition-all hover:bg-[#0ea5e9] hover:text-black">C&oacute;digo</a>}
            </div>
            {project.featured && <span className="absolute top-3 right-3 px-2 py-1 bg-amber-500 text-black text-xs font-bold rounded-full uppercase tracking-wider shadow-[0_4px_14px_rgba(245,158,11,0.3)]">Destacado</span>}
            <div className="w-full h-full flex items-center justify-center text-[#64748b]"><svg className="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
          </div>
          <div className="p-6">
            <div className="flex items-start justify-between gap-4 mb-3">
              <h3 className="text-xl font-bold text-[#f1f5f9] flex-1">{project.title}</h3>
              {project.featured && <span className="flex-shrink-0 w-5 h-5 text-amber-500"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></span>}
            </div>
            <p className="text-[#94a3b8] leading-relaxed mb-4">{project.description}</p>
            <div className="flex flex-wrap gap-2 mb-4">
              {techs.map((tech, i) => <span key={i} className={'px-2.5 py-1 text-xs rounded-full ' + getTechColor(tech)}>{tech}</span>)}
            </div>
            {project.highlights && project.highlights.length > 0 && (
              <ul className="space-y-2 border-t border-[#2d3a4f]/50 pt-4">
                {project.highlights.map((h, i) => <li key={i} className="flex items-start gap-2 text-sm text-[#94a3b8]"><svg className="w-4 h-4 text-[#0ea5e9] shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>{h}</li>)}
              </ul>
            )}
          </div>
        </article>
      );
    });

    const FALLBACK_PROJECTS = [
      { _id: '1', title: 'E-commerce Full-Stack', description: 'Tienda en l&iacute;nea completa con carrito, pagos y panel admin usando MERN stack.', technologies: ['React', 'Node.js', 'Express', 'MongoDB'], featured: true },
      { _id: '2', title: 'Landing Page Startup', description: 'P&aacute;gina de aterrizaje de una sola p&aacute;gina con alta tasa de conversi&oacute;n.', technologies: ['React', 'TypeScript', 'Tailwind'], featured: true },
      { _id: '3', title: 'Dashboard Anal&iacute;tico', description: 'Panel de control con gr&aacute;ficas en tiempo real y autenticaci&oacute;n de usuarios.', technologies: ['React', 'Node.js', 'Express', 'MongoDB', 'GraphQL'], featured: false }
    ];

    function Projects({ projects, loading }) {
      if (loading) return (
        <section id="projects" className="py-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
          <div className="text-center mb-16"><h2 className="text-3xl md:text-4xl font-black text-[#f1f5f9] mb-4">Mis Proyectos</h2><div className="w-20 h-1 bg-[#0ea5e9] rounded-full mx-auto" /></div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {[1,2,3].map(i => <article key={i} className="bg-[#1e293b] border border-[#2d3a4f] rounded-2xl overflow-hidden animate-pulse"><div className="aspect-video bg-[#111827]"/><div className="p-6 space-y-4"><div className="h-6 bg-[#111827] rounded w-3/4"/><div className="h-4 bg-[#111827] rounded w-1/2"/><div className="h-4 bg-[#111827] rounded w-1/3"/></div></article>)}
          </div>
        </section>
      );
      return (
        <section id="projects" className="py-20 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">
          <div className="text-center mb-16"><h2 className="text-3xl md:text-4xl font-black text-[#f1f5f9] mb-4">Mis Proyectos</h2><div className="w-20 h-1 bg-[#0ea5e9] rounded-full mx-auto" /></div>
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {projects.length === 0 ? <p className="col-span-full text-center text-[#64748b] py-12">No hay proyectos disponibles</p>
              : projects.map(p => <ProjectCard key={p._id} project={p} />)}
          </div>
        </section>
      );
    }

    /* ── Skills ── */
    const skillCategories = [
      { name: 'Frontend', icon: '\u269B\uFE0F', skills: ['React', 'TypeScript', 'JavaScript', 'HTML5', 'CSS3', 'Tailwind CSS', 'Vite', 'Next.js'] },
      { name: 'Backend', icon: '\uD83D\uDFE2', skills: ['Node.js', 'Express', 'MongoDB', 'PostgreSQL', 'REST APIs', 'GraphQL', 'JWT Auth'] },
      { name: 'DevOps & Tools', icon: '\u2601\uFE0F', skills: ['Git', 'GitHub Actions', 'Docker', 'AWS', 'Vercel', 'Linux', 'VS Code', 'Postman'] }
    ];
    const levelMap = { React: 95, TypeScript: 92, JavaScript: 90, HTML5: 95, CSS3: 92, 'Tailwind CSS': 88, 'Next.js': 85, Vite: 90, 'Node.js': 90, Express: 88, MongoDB: 85, PostgreSQL: 80, 'REST APIs': 88, GraphQL: 82, 'JWT Auth': 85, Git: 95, 'GitHub Actions': 85, Docker: 82, AWS: 80, Vercel: 90, Linux: 85, 'VS Code': 95, Postman: 88 };

    function SkillBar({ name, level, index }) {
      const barRef = React.useRef(null);
      useEffect(() => {
        const el = barRef.current;
        if (!el) return;
        const observer = new IntersectionObserver(entries => {
          entries.forEach(entry => { if (entry.isIntersecting) { el.style.width = level + '%'; observer.unobserve(el); } });
        }, { threshold: 0.3 });
        observer.observe(el);
        return () => observer.disconnect();
      }, [level]);
      return (
        <div key={name} style={{ animationDelay: index * 80 + 'ms' }}>
          <div className="flex justify-between mb-1.5"><span className="text-[#f1f5f9] font-medium">{name}</span><span className="text-[#0ea5e9] font-bold text-sm">{level}%</span></div>
          <div className="h-2 bg-[#111827] rounded-full overflow-hidden">

          </div>
        </div>
      );
