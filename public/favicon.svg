<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado con gradiente primario → acento -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Inicial "EM" en oscuro, bold -->
  <text x="50" y="68" font-family="Inter, system-ui, sans-serif" font-size="50" font-weight="800" fill="#0a0f1a" text-anchor="middle" letter-spacing="-1">EM</text>
</svg>
